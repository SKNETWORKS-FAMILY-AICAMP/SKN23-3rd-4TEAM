{% extends "base.html" %}
{% block content %}
<div class="panel">
  <h2>로그인</h2>
  {% if error %}<div class="notice">{{ error }}</div>{% endif %}
  <form action="/auth/pin" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token_for(request) }}">
    <div class="form-row">
      <label>아이디</label>
      <input name="username" required>
    </div>
    <div class="form-row">
      <label>PIN</label>
      <input name="pin" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">로그인</button>
  </form>
  <p style="margin-top:12px;">
    상담자용 로그인: <a href="/counselor/login">/counselor/login</a>
  </p>
</div>
{% endblock %}
