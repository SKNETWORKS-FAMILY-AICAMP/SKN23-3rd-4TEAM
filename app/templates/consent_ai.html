{% extends "base.html" %}
{% block content %}
<div class="panel">
  <h2>AI 상담 보조 사용 서약서</h2>
  {% if error %}
    <div class="notice">{{ error }}</div>
  {% endif %}
  <p class="muted">아래 내용을 확인하고 동의해야 채팅을 시작할 수 있습니다.</p>

  <div class="notice" style="background:#f8f5ea; border-color:#e6dbc2; color:#4c4231;">
    <strong>버전:</strong> {{ consent_version }}<br>
    {{ consent_text }}
  </div>

  <form action="/consent/ai" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token_for(request) }}">
    <div class="form-row">
      <label>
        <input type="checkbox" name="agree" value="on" required style="width:auto; margin-right:8px;">
        위 내용을 이해했으며 AI 상담 보조 사용에 동의합니다.
      </label>
    </div>
    <button class="btn" type="submit">동의하고 상담 시작</button>
  </form>
</div>
{% endblock %}
