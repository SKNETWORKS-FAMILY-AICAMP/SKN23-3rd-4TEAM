<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "상담 보조 챗봇" }}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">상담 보조 챗봇</div>
    <nav>
      {% if current_user %}
        <span class="role-badge">{{ current_user.role }}</span>
        <form action="/logout" method="post" class="inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token_for(request) }}">
          <button class="btn ghost" type="submit">로그아웃</button>
        </form>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
